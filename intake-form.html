<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Content Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 600;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .color-input {
            height: 50px;
            cursor: pointer;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 YouTube Content Generator</h1>
        <form id="contentForm">
            <div class="form-group">
                <label for="brandName">Brand Name *</label>
                <input type="text" id="brandName" name="brandName" required placeholder="Enter your brand name">
            </div>
            
            <div class="form-group">
                <label for="topic">Video Topic *</label>
                <input type="text" id="topic" name="topic" required placeholder="What's your video about?">
            </div>
            
            <div class="form-group">
                <label for="tone">Content Tone *</label>
                <select id="tone" name="tone" required>
                    <option value="">Select tone...</option>
                    <option value="professional">Professional</option>
                    <option value="fun">Fun & Casual</option>
                    <option value="inspirational">Inspirational</option>
                    <option value="educational">Educational</option>
                    <option value="entertaining">Entertaining</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="videoLength">Video Length</label>
                <select id="videoLength" name="videoLength">
                    <option value="short">Short (1-3 minutes)</option>
                    <option value="medium">Medium (5-10 minutes)</option>
                    <option value="long">Long (15+ minutes)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="targetAudience">Target Audience</label>
                <input type="text" id="targetAudience" name="targetAudience" placeholder="Who is your target audience?">
            </div>
            
            <div class="form-group">
                <label for="brandColors">Primary Brand Color</label>
                <input type="color" id="brandColors" name="brandColors" value="#667eea" class="color-input">
            </div>
            
            <div class="form-group">
                <label for="stylePreference">Visual Style</label>
                <select id="stylePreference" name="stylePreference">
                    <option value="modern">Modern & Clean</option>
                    <option value="bold">Bold & Vibrant</option>
                    <option value="minimal">Minimal & Simple</option>
                    <option value="creative">Creative & Artistic</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="additionalNotes">Additional Notes</label>
                <textarea id="additionalNotes" name="additionalNotes" placeholder="Any specific requirements or preferences?"></textarea>
            </div>
            
            <button type="submit" class="btn" id="generateBtn">
                🚀 Generate YouTube Content Pack
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating your content pack...</p>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('contentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            // Show loading state
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            
            try {
                // Call Agent 1 API
                const response = await fetch('/api/generate-content', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    // Redirect to results page or show results
                    window.location.href = `/results?id=${result.jobId}`;
                } else {
                    throw new Error('Failed to generate content');
                }
            } catch (error) {
                alert('Error generating content. Please try again.');
                console.error('Error:', error);
            } finally {
                // Reset loading state
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        });
    </script>
</body>
</html>
