worker_processes auto;
events {
    worker_connections 1024;
}

http {
    upstream content_platform {
        server web:5000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=generate:10m rate=2r/s;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000";

        # General API rate limiting
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://content_platform;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Stricter rate limiting for content generation
        location /api/generate {
            limit_req zone=generate burst=5 nodelay;
            proxy_pass http://content_platform;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 180s;
        }

        # Static files
        location / {
            proxy_pass http://content_platform;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # File downloads
        location /api/download/ {
            proxy_pass http://content_platform;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
    }
}
